version: '3.8'

services:
  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-cloud-management-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage/app/public:/var/www/html/storage/app/public
    networks:
      - digital-cloud-network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_NAME=DigitalCloudManagement
      - APP_ENV=production
      - APP_KEY=base64:xZQd5QJI754z57LmPW0KlnVJsSEYlieKWa2MDOqHVpU=
      - APP_DEBUG=true
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=digital_cloud_management
      - DB_USERNAME=root
      - DB_PASSWORD=SecurePassword123!
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - PUSHER_APP_ID=pusher
      - PUSHER_APP_KEY=your-pusher-key
      - PUSHER_APP_SECRET=base64:xZQd5QJI754z57LmPW0KlnVJsSEYlieKWa2MDOqHVpU=
      - PUSHER_HOST=127.0.0.1
      - PUSHER_PORT=6001
      - PUSHER_SCHEME=http

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: digital-cloud-management-nginx
    restart: unless-stopped
    ports:
      - "8011:80"
      - "4431:443"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - digital-cloud-network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: digital-cloud-management-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=digital_cloud_management
      - MYSQL_ROOT_PASSWORD=SecurePassword123!
      - MYSQL_PASSWORD=SecurePassword123!
      - MYSQL_USER=digital_cloud_user
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - digital-cloud-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: digital-cloud-management-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - digital-cloud-network

  # Redis Commander (Redis Management UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: digital-cloud-management-redis-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - digital-cloud-network
    depends_on:
      - redis

  # MailHog (Email Testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: digital-cloud-management-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - digital-cloud-network

  # Laravel Queue Worker
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-cloud-management-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./:/var/www/html
    networks:
      - digital-cloud-network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=digital_cloud_management
      - DB_USERNAME=root
      - DB_PASSWORD=SecurePassword123!
      - REDIS_HOST=redis
      - REDIS_PORT=6378
      - QUEUE_CONNECTION=redis

  # Laravel Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-cloud-management-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./:/var/www/html
    networks:
      - digital-cloud-network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=digital_cloud_management
      - DB_USERNAME=root
      - DB_PASSWORD=SecurePassword123!
      - REDIS_HOST=redis
      - REDIS_PORT=6378

  # phpMyAdmin (Database Management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: digital-cloud-management-phpmyadmin
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=SecurePassword123!
      - MYSQL_ROOT_PASSWORD=SecurePassword123!
    networks:
      - digital-cloud-network
    depends_on:
      - mysql

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  digital-cloud-network:
    driver: bridge
